<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Nils & Vidar – Arbetstider 2026</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />

  <!-- PWA: gör appen installningsbar på hemskärmen -->
  <link rel="manifest" href="manifest.json" />
  <meta name="theme-color" content="#1A1916" />
  <link rel="icon" href="icons/icon-192.png" />
  <link rel="apple-touch-icon" href="icons/apple-touch-icon.png" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Arbetstider" />

  <script type="module">
    import { initializeApp }        from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getAuth, signInWithPopup, signOut, onAuthStateChanged, GoogleAuthProvider }
                                    from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

    const firebaseConfig = {
      apiKey:            "AIzaSyANpy3TW66DEAj0eIkgXdOwr_LPIsW3Dok",
      authDomain:        "arbetstider-49e03.firebaseapp.com",
      projectId:         "arbetstider-49e03",
      storageBucket:     "arbetstider-49e03.firebasestorage.app",
      messagingSenderId: "696407740850",
      appId:             "1:696407740850:web:44e99840cde607f51294ab"
    };

    const ALLOWED = [
      "markus.thorstvedt@gmail.com",
      "louise.thorstvedt@gmail.com",
      "nils.thorstvedt@gmail.com",
      "vidar.thorstvedt@gmail.com"
    ];

    const CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTmVn336HAXYDHUCJE-_fBO1ZjJeqmdjuZ2Gz0OXmzOoP93B7lNYj9xKQIB0PjHnxSE2HewugTmH5cW/pub?gid=0&single=true&output=csv";

    const MONTH_MAP = {
      "januari":1,"februari":2,"mars":3,"april":4,"maj":5,"juni":6,
      "juli":7,"augusti":8,"september":9,"oktober":10,"november":11,"december":12
    };
    const MONTH_NAMES = {
      1:"Januari",2:"Februari",3:"Mars",4:"April",5:"Maj",6:"Juni",
      7:"Juli",8:"Augusti",9:"September",10:"Oktober",11:"November",12:"December"
    };

    let pollStarted = false;

    const app      = initializeApp(firebaseConfig);
    const auth     = getAuth(app);
    const provider = new GoogleAuthProvider();

    onAuthStateChanged(auth, user => {
      if (!user) { showScreen("login"); return; }
      const email = user.email.toLowerCase();
      if (!ALLOWED.includes(email)) { showScreen("denied", user); return; }
      showScreen("app", user);
      loadSchedule();
    });

    document.getElementById("btn-login").addEventListener("click", async () => {
      document.getElementById("login-error").textContent = "";
      try {
        await signInWithPopup(auth, provider);
      } catch (e) {
        if (e.code !== "auth/popup-closed-by-user") {
          document.getElementById("login-error").textContent = "Inloggning misslyckades. Försök igen.";
        }
      }
    });

    document.getElementById("btn-signout").addEventListener("click",       () => signOut(auth));
    document.getElementById("btn-signout-denied").addEventListener("click", () => signOut(auth));

    function showScreen(name, user) {
      document.getElementById("screen-login").style.display  = name === "login"  ? "flex" : "none";
      document.getElementById("screen-denied").style.display = name === "denied" ? "flex" : "none";
      document.getElementById("screen-app").style.display    = name === "app"    ? "block" : "none";
      if (name === "app" && user) {
        document.getElementById("user-email").textContent  = user.email;
        document.getElementById("user-avatar").textContent = (user.displayName || user.email)[0].toUpperCase();
      }
      if (name === "denied" && user) {
        document.getElementById("denied-email").textContent = user.email;
      }
    }

    function splitCSVRow(row) {
      const result = []; let cur = "", inQ = false;
      for (let i = 0; i < row.length; i++) {
        const c = row[i];
        if (c === '"') { inQ = !inQ; }
        else if (c === ',' && !inQ) { result.push(cur); cur = ""; }
        else { cur += c; }
      }
      result.push(cur);
      return result;
    }

    function parseDate(datumStr) {
      const parts = datumStr.trim().toLowerCase().split(" ");
      if (parts.length < 2) return null;
      const day = parseInt(parts[0]);
      const month = MONTH_MAP[parts[1]];
      if (!day || !month) return null;
      return { month, day, iso: `2026-${String(month).padStart(2,"0")}-${String(day).padStart(2,"0")}` };
    }

    function parseCSV(text) {
      const lines = text.split("\n").map(l => l.trim()).filter(Boolean);
      const schedule = [];
      let headerIdx = -1;
      for (let i = 0; i < lines.length; i++) {
        if (lines[i].toLowerCase().includes("datum")) { headerIdx = i; break; }
      }
      if (headerIdx === -1) return schedule;
      const headers = splitCSVRow(lines[headerIdx]).map(h => h.trim().toLowerCase());
      const iDatum = headers.findIndex(h => h === "datum");
      const iDag   = headers.findIndex(h => h === "dag");
      const iNils  = headers.findIndex(h => h === "nils");
      const iVidar = headers.findIndex(h => h === "vidar");
      const iNote  = headers.findIndex(h => h === "skjutsa");
      for (let i = headerIdx + 1; i < lines.length; i++) {
        const cols = splitCSVRow(lines[i]);
        const datumRaw = cols[iDatum] || "";
        if (!datumRaw.trim()) continue;
        const parsed = parseDate(datumRaw);
        if (!parsed) continue;
        schedule.push({
          date:  parsed.iso,
          month: parsed.month,
          day:   parsed.day,
          dag:   (cols[iDag]  || "").trim(),
          nils:  (cols[iNils] || "").trim().replace(/-/g,"--"),
          vidar: (cols[iVidar]|| "").trim().replace(/-/g,"--"),
          note:  iNote >= 0 ? (cols[iNote] || "").trim() : "",
        });
      }
      return schedule;
    }

    function getAvailableMonths(schedule) {
      return [...new Set(schedule.map(d => d.month))].sort((a,b) => a - b);
    }

    // Bygger om månad-knapparna och månad-sektionerna i DOM:en utifrån
    // vilka månader som faktiskt finns i Sheet-datan just nu. Så snart fler
    // månader fylls på i kalkylarket dyker de upp här automatiskt.
    function renderMonthShell(months) {
      const nav  = document.getElementById("month-nav");
      const main = document.getElementById("months-container");
      const activeBefore = document.querySelector(".month-btn.active")?.dataset.month;

      nav.innerHTML = months.map(m =>
        `<button class="month-btn" data-month="${m}">${MONTH_NAMES[m]}</button>`
      ).join("");

      main.innerHTML = months.map(m => `
        <div class="month-section" id="month-${m}">
          <p class="month-heading">${MONTH_NAMES[m]} 2026</p>
          <div class="day-list" id="list-${m}"></div>
        </div>
      `).join("");

      return activeBefore ? parseInt(activeBefore) : null;
    }

    function buildLists(schedule, months) {
      const todayStr = new Date().toISOString().slice(0,10);
      months.forEach(m => {
        const days   = schedule.filter(d => d.month === m);
        const listEl = document.getElementById("list-" + m);
        listEl.innerHTML = "";
        days.forEach(d => {
          const hasNils  = d.nils  !== "";
          const hasVidar = d.vidar !== "";
          const isEmpty  = !hasNils && !hasVidar;
          const isToday  = d.date === todayStr;
          const card = document.createElement("div");
          card.className = "day-card" + (isEmpty ? " empty" : "") + (isToday ? " today" : "");
          const dateCol = document.createElement("div");
          dateCol.className = "date-col";
          dateCol.innerHTML = '<span class="date-num">' + d.day + '</span><span class="date-day">' + d.dag + '</span>';
          const shiftsCol = document.createElement("div");
          shiftsCol.className = "shifts-col";
          if (hasNils)  shiftsCol.innerHTML += '<div class="shift-chip nils"><span class="shift-label">NILS</span>' + d.nils + '</div>';
          if (hasVidar) shiftsCol.innerHTML += '<div class="shift-chip vidar"><span class="shift-label">VIDAR</span>' + d.vidar + '</div>';
          if (!hasNils && !hasVidar) shiftsCol.innerHTML += '<span class="off-label">Ledigt</span>';
          if (d.note)   shiftsCol.innerHTML += '<div class="note-chip"><svg class="pin-icon" viewBox="0 0 16 16" width="12" height="12" fill="currentColor" aria-hidden="true"><path d="M8 1a3.5 3.5 0 0 0-3.5 3.5c0 1.9 1.9 4.2 3.5 6.4 1.6-2.2 3.5-4.5 3.5-6.4A3.5 3.5 0 0 0 8 1zm0 5a1.5 1.5 0 1 1 0-3 1.5 1.5 0 0 1 0 3zM7.25 11v3.25a.75.75 0 0 0 1.5 0V11h-1.5z"/></svg> ' + d.note + '</div>';
          card.appendChild(dateCol);
          card.appendChild(shiftsCol);
          listEl.appendChild(card);
        });
      });
    }

    async function loadSchedule() {
      const spinner    = document.getElementById("spinner");
      const statusText = document.getElementById("status-text");
      spinner.style.display = "inline-block";
      statusText.textContent = "Haemtar schema...";
      try {
        const res = await fetch(CSV_URL + "&cachebust=" + Date.now());
        if (!res.ok) throw new Error("HTTP " + res.status);
        const text = await res.text();
        const schedule = parseCSV(text);
        if (schedule.length === 0) throw new Error("Tom data");

        checkForScheduleChange(schedule);

        const months = getAvailableMonths(schedule);
        const wasActive = renderMonthShell(months);
        buildLists(schedule, months);

        const now = new Date();
        const timeStr = now.toLocaleTimeString("sv-SE", { hour:"2-digit", minute:"2-digit" });
        spinner.style.display = "none";
        statusText.innerHTML = "Uppdaterat " + timeStr + " &nbsp;&middot;&nbsp; <button class='refresh-link' id='reload-btn'>Uppdatera</button>";
        document.getElementById("reload-btn").addEventListener("click", loadSchedule);

        const todayMonth = now.getMonth() + 1;
        const target = months.includes(wasActive) ? wasActive
                     : months.includes(todayMonth) ? todayMonth
                     : months[0];
        if (target) showMonth(target);

        setTimeout(() => {
          const todayCard = document.querySelector(".day-card.today");
          if (todayCard) todayCard.scrollIntoView({ behavior:"smooth", block:"center" });
        }, 150);

        if (!pollStarted) {
          pollStarted = true;
          setInterval(loadSchedule, 5 * 60 * 1000); // kolla efter ändringar var 5:e minut
        }
      } catch(err) {
        spinner.style.display = "none";
        statusText.innerHTML = "Kunde inte haemta data &nbsp;&middot;&nbsp; <button class='refresh-link' id='reload-btn'>Foersoek igen</button>";
        document.getElementById("reload-btn").addEventListener("click", loadSchedule);
        console.error(err);
      }
    }

    function showMonth(m) {
      document.querySelectorAll(".month-btn").forEach(b =>
        b.classList.toggle("active", parseInt(b.dataset.month) === m));
      document.querySelectorAll(".month-section").forEach(s =>
        s.classList.toggle("visible", s.id === "month-" + m));
    }

    // Månad-knapparna byggs om varje gång datan uppdateras, så vi lyssnar
    // via delegation på den omslutande behållaren istället för på knapparna direkt.
    document.getElementById("month-nav").addEventListener("click", (e) => {
      const btn = e.target.closest(".month-btn");
      if (btn) showMonth(parseInt(btn.dataset.month));
    });

    // ---- Notiser vid schemaändring ----------------------------------------
    // Vi sparar en "signatur" av hela schemat i localStorage. Om signaturen
    // skiljer sig från förra gången (och notiser är påslagna) visar vi en
    // notis om att schemat har ändrats. Detta täcker fallet att appen är
    // öppen (eller pollas var 5:e minut enligt ovan). Se sw.js för ett
    // best-effort-försök att även upptäcka ändringar när appen är stängd
    // (fungerar bara på plattformar som stödjer Periodic Background Sync).
    function scheduleSignature(schedule) {
      return schedule.map(d => `${d.date}|${d.nils}|${d.vidar}|${d.note}`).join(";");
    }

    async function notifyScheduleChanged() {
      const title = "Schemat har uppdaterats";
      const options = { body: "Nya tider finns för Nils & Vidar.", icon: "icons/icon-192.png", badge: "icons/icon-192.png" };
      try {
        if ("serviceWorker" in navigator) {
          const reg = await navigator.serviceWorker.getRegistration();
          if (reg) { reg.showNotification(title, options); return; }
        }
        new Notification(title, options);
      } catch (e) { console.error("Kunde inte visa notis", e); }
    }

    function checkForScheduleChange(schedule) {
      const sig     = scheduleSignature(schedule);
      const prevSig = localStorage.getItem("schedule-sig");
      const enabled = localStorage.getItem("notify-enabled") === "1";
      if (prevSig && prevSig !== sig && enabled && window.Notification && Notification.permission === "granted") {
        notifyScheduleChanged();
      }
      localStorage.setItem("schedule-sig", sig);
    }

    function updateNotifyButton() {
      const btn = document.getElementById("btn-notify");
      if (!btn) return;
      const supported = "Notification" in window;
      const enabled   = supported && localStorage.getItem("notify-enabled") === "1" && Notification.permission === "granted";
      btn.textContent = enabled ? "🔔" : "🔕";
      btn.title = !supported ? "Notiser stöds inte i den här webbläsaren"
                : Notification.permission === "denied" ? "Notiser blockerade i webbläsaren"
                : enabled ? "Notiser på – klicka för att stänga av"
                : "Slå på notiser vid schemaändring";
    }

    async function toggleNotifications() {
      if (!("Notification" in window)) return;
      if (Notification.permission === "denied") {
        alert("Notiser är blockerade för den här sidan i din webbläsare. Ändra behörigheten i webbläsarinställningarna om du vill slå på dem.");
        return;
      }
      const currentlyEnabled = localStorage.getItem("notify-enabled") === "1";
      if (currentlyEnabled) {
        localStorage.setItem("notify-enabled", "0");
        updateNotifyButton();
        return;
      }
      let perm = Notification.permission;
      if (perm === "default") perm = await Notification.requestPermission();
      if (perm === "granted") {
        localStorage.setItem("notify-enabled", "1");
        registerPeriodicSync();
      }
      updateNotifyButton();
    }

    async function registerPeriodicSync() {
      if (!("serviceWorker" in navigator)) return;
      try {
        const reg = await navigator.serviceWorker.ready;
        if ("periodicSync" in reg) {
          const status = await navigator.permissions.query({ name: "periodic-background-sync" });
          if (status.state === "granted") {
            await reg.periodicSync.register("check-schedule", { minInterval: 60 * 60 * 1000 });
          }
        }
      } catch (e) { /* Periodic Background Sync stöds inte här — foreground-pollingen tar över. */ }
    }

    document.getElementById("btn-notify")?.addEventListener("click", toggleNotifications);
    updateNotifyButton();

    if ("serviceWorker" in navigator) {
      navigator.serviceWorker.register("sw.js")
        .then(() => { if (localStorage.getItem("notify-enabled") === "1") registerPeriodicSync(); })
        .catch(e => console.error("Service worker-registrering misslyckades", e));
    }

  </script>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg:        #F7F6F3;
      --surface:   #FFFFFF;
      --border:    #E4E2DC;
      --text:      #1A1916;
      --muted:     #8A8880;
      --nils:      #3B6FD4;
      --nils-bg:   #EBF1FC;
      --vidar:     #C4510E;
      --vidar-bg:  #FDEEE5;
      --note-bg:   #FFFBEA;
      --note:      #92720A;
      --today-ring:#3B6FD4;
    }
    body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

    #screen-login, #screen-denied {
      display: none; min-height: 100vh;
      align-items: center; justify-content: center; padding: 24px;
    }
    .auth-card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 16px; padding: 40px 36px;
      max-width: 380px; width: 100%; text-align: center;
    }
    .auth-icon { font-size: 36px; margin-bottom: 16px; }
    .auth-card h1 { font-size: 20px; font-weight: 600; letter-spacing: -.3px; margin-bottom: 8px; }
    .auth-card p  { font-size: 14px; color: var(--muted); margin-bottom: 28px; line-height: 1.5; }
    .auth-card p strong { color: var(--text); }
    .btn-google {
      display: inline-flex; align-items: center; justify-content: center;
      gap: 10px; padding: 12px 24px; width: 100%;
      background: var(--text); color: #fff;
      border: none; border-radius: 10px;
      font-family: inherit; font-size: 15px; font-weight: 500;
      cursor: pointer; transition: opacity .15s;
    }
    .btn-google:hover { opacity: .85; }
    .btn-signout-link {
      background: none; border: none; color: var(--muted);
      font-family: inherit; font-size: 13px; cursor: pointer;
      margin-top: 16px; text-decoration: underline; display: block;
    }
    .btn-signout-link:hover { color: var(--text); }
    #login-error { color: #C4510E; font-size: 13px; margin-top: 12px; min-height: 18px; }

    #screen-app { display: none; }

    header {
      background: var(--surface); border-bottom: 1px solid var(--border);
      padding: 16px 20px 12px; position: sticky; top: 0; z-index: 100;
    }
    .header-inner {
      max-width: 640px; margin: 0 auto;
      display: flex; align-items: center; gap: 10px; flex-wrap: wrap;
    }
    .header-title { font-size: 17px; font-weight: 600; letter-spacing: -.3px; flex: 1; }
    .header-title span { color: var(--muted); font-weight: 400; }
    .legend { display: flex; gap: 10px; }
    .legend-item { display: flex; align-items: center; gap: 5px; font-size: 13px; font-weight: 500; }
    .dot { width: 9px; height: 9px; border-radius: 50%; }
    .dot-nils  { background: var(--nils); }
    .dot-vidar { background: var(--vidar); }
    .user-pill {
      display: flex; align-items: center; gap: 7px;
      background: var(--bg); border: 1px solid var(--border);
      border-radius: 20px; padding: 4px 10px 4px 4px;
      font-size: 12px; color: var(--muted);
    }
    .user-avatar {
      width: 24px; height: 24px; border-radius: 50%;
      background: var(--nils); color: #fff;
      font-size: 11px; font-weight: 600;
      display: flex; align-items: center; justify-content: center; flex-shrink: 0;
    }
    #btn-signout {
      background: none; border: none; padding: 0 0 0 4px;
      color: var(--muted); font-size: 11px; font-family: inherit; cursor: pointer;
    }
    #btn-signout:hover { color: var(--text); }
    .btn-notify {
      background: none; border: none; font-size: 14px;
      cursor: pointer; line-height: 1; padding: 0 2px;
      filter: grayscale(1); opacity: .6; transition: all .15s;
    }
    .btn-notify:hover { opacity: 1; }

    #status-bar {
      max-width: 640px; margin: 10px auto 0; padding: 0 20px;
      font-size: 12px; color: var(--muted);
      display: flex; align-items: center; gap: 6px; min-height: 18px;
    }
    .spinner {
      width: 11px; height: 11px; flex-shrink: 0;
      border: 2px solid var(--border); border-top-color: var(--nils);
      border-radius: 50%; animation: spin .7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .refresh-link {
      background: none; border: none; color: var(--nils);
      font-family: inherit; font-size: 12px; cursor: pointer; text-decoration: underline;
    }

    .month-nav {
      max-width: 640px; margin: 12px auto 0; padding: 0 20px; display: flex; gap: 8px;
    }
    .month-btn {
      padding: 6px 16px; border-radius: 20px;
      border: 1px solid var(--border); background: var(--surface);
      color: var(--muted); font-family: inherit; font-size: 14px;
      font-weight: 500; cursor: pointer; transition: all .15s;
    }
    .month-btn:hover  { border-color: var(--text); color: var(--text); }
    .month-btn.active { background: var(--text); color: #fff; border-color: var(--text); }

    main { max-width: 640px; margin: 0 auto; padding: 16px 20px 60px; }
    .month-section { display: none; }
    .month-section.visible { display: block; }
    .month-heading {
      font-size: 12px; font-weight: 600; letter-spacing: .08em;
      text-transform: uppercase; color: var(--muted); margin-bottom: 10px;
    }
    .day-list { display: flex; flex-direction: column; gap: 5px; }

    .day-card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 10px; padding: 11px 14px;
      display: grid; grid-template-columns: 62px 1fr;
      gap: 10px; align-items: start;
    }
    .day-card.empty { background: transparent; border-color: transparent; opacity: .38; }
    .day-card.today { border-color: var(--today-ring); box-shadow: 0 0 0 1px var(--today-ring); }

    .date-col { display: flex; flex-direction: column; }
    .date-num { font-family: 'DM Mono', monospace; font-size: 21px; font-weight: 500; line-height: 1; }
    .date-day { font-size: 11px; color: var(--muted); margin-top: 2px; }

    .shifts-col { display: flex; flex-direction: column; gap: 5px; padding-top: 2px; }
    .shift-chip {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 4px 10px; border-radius: 6px;
      font-family: 'DM Mono', monospace; font-size: 13px;
      font-weight: 500; width: fit-content;
    }
    .shift-chip.nils  { background: var(--nils-bg);  color: var(--nils); }
    .shift-chip.vidar { background: var(--vidar-bg); color: var(--vidar); }
    .shift-label { font-size: 10px; font-weight: 600; letter-spacing: .06em; opacity: .65; }
    .note-chip {
      display: inline-flex; align-items: center; gap: 5px;
      padding: 3px 8px; border-radius: 5px; font-size: 12px; font-weight: 500;
      background: var(--note-bg); color: var(--note); width: fit-content;
    }
    .off-label { font-size: 13px; color: var(--muted); padding-top: 1px; }
  </style>
</head>
<body>

  <div id="screen-login">
    <div class="auth-card">
      <div class="auth-icon">&#128197;</div>
      <h1>Nils &amp; Vidar &ndash; Arbetstider</h1>
      <p>Logga in med ett <strong>@gmail.com</strong>-konto som har tillg&aring;ng till schemat.</p>
      <button class="btn-google" id="btn-login">
        <svg width="18" height="18" viewBox="0 0 18 18" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844c-.209 1.125-.843 2.078-1.796 2.717v2.258h2.908C16.658 14.013 17.64 11.706 17.64 9.2z" fill="white" fill-opacity="0.9"/>

  <div id="screen-denied">

      <h1>Ingen &aring;tkomst</h1>

  </div>

  <div id="screen-app">
    <header>
      <div class="header-inner">
        <div class="header-title">Nils &amp; Vidar <span>arbetstider 2026</span></div>

          <div class="legend-item"><div class="dot dot-nils"></div> Nils</div>
          <div class="legend-item"><div class="dot dot-vidar"></div> Vidar</div>
        </div>
        <div class="user-pill">
          <button id="btn-notify" class="btn-notify" title="Slå på notiser vid schemaändring">🔕</button>
          <div class="user-avatar" id="user-avatar"></div>
          <span id="user-email"></span>
          <button id="btn-signout" title="Logga ut">&#10005;</button>
        </div>
      </div>
    </header>

    <div id="status-bar">
      <div class="spinner" id="spinner"></div>
      <span id="status-text">H&auml;mtar schema&hellip;</span>
    </div>

    <div class="month-nav" id="month-nav"></div>

    <main>
      <div id="months-container"></div>
    </main>
  </div>
